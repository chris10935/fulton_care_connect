services:
  - type: web
    name: fulton-care-chat-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false  # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11"
